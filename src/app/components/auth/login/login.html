<div class="auth-body">
<button class="icon-button theme-toggle auth-theme-toggle" type="button" data-theme-toggle aria-label="Switch color theme" title="Switch color theme">
    <i class="bi bi-moon-stars" data-theme-icon aria-hidden="true"></i>
  </button>
  <main class="auth-page">
    <section class="auth-card">
      <a class="auth-brand" href="index.html"><span class="brand-icon"><i class="bi bi-grid-1x2-fill" aria-hidden="true"></i></span><span><strong>SAES</strong><small>Iniciar Sesion</small></span></a>
      <div class="auth-visual"><img src="../assets/images/png/dasher-ui-bootstrap-5.jpg" alt="adminHMD dashboard interface"></div>
      <form class="needs-validation" novalidate>
        <div class="mb-4">
          <p class="eyebrow mb-1">Acceso seguro</p>
          <h1 class="h3 mb-1">Login</h1>
          <p class="text-muted mb-0">Inicia sesión en tu cuenta.</p>
        </div>
        <div class="mb-3"><label class="form-label" for="loginEmail">Email</label><input class="form-control" id="loginEmail" type="email" required><div class="invalid-feedback">Ingresa un Email valido</div></div>
        <div class="mb-3"><div class="d-flex justify-content-between"><label class="form-label" for="loginPassword">Clave</label><a class="small fw-semibold" routerLink="/recuperar">¿Olvidaste tu clave?</a></div><input class="form-control" id="loginPassword" type="password" minlength="6" required><div class="invalid-feedback">Clave debe ser al menos 6 caracteres</div></div>
        <div class="form-check mb-4"><input class="form-check-input" type="checkbox" id="rememberMe"><label class="form-check-label" for="rememberMe">Recuérdame</label></div>
        <button class="btn btn-primary w-100" type="submit"><i class="bi bi-box-arrow-in-right" aria-hidden="true"></i> Ingresar</button>
      </form>
      
      <div class="auth-footer">¿Nuevo aquí? <a routerLink="/registro">Crear una cuenta</a></div>
    </section>
  </main>
</div>
